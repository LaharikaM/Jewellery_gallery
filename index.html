<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Earring Collection</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

h2{
  text-align:center;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

.item{
  position:relative;
  cursor:pointer;
  border:2px solid transparent;
  border-radius:8px;
}

.item.selected{
  border:2px solid #ff9900;
}

.item img{
  width:100%;
  border-radius:8px;
}

.num{
  position:absolute;
  top:6px;
  left:6px;
  background:black;
  color:white;
  font-weight:bold;
  padding:4px 8px;
  border-radius:4px;
}

/* Lightbox viewer */
.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.viewer img{
  max-width:90%;
  max-height:90%;
}

.viewer.show{
  display:flex;
}

#sendBtn{
  display:block;
  margin:20px auto;
  padding:10px 20px;
  font-size:16px;
  background:#ff9900;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Earring Collection</h2>

<div class="gallery" id="gallery"></div>

<button id="sendBtn">Send Selection</button>

<!-- Lightbox viewer -->
<div id="viewer" class="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

<script>
// === Configuration ===
const totalImages = 7; // change to total number of images
const extension = "jpeg"; // change to your image extension if needed
const emailTo = "tanam.laharika1990@gmail.com"; // replace with your email

// === Script ===
const gallery = document.getElementById("gallery");
let selected = [];

for(let i=1;i<=totalImages;i++){
  const div = document.createElement("div");
  div.className = "item";
  div.dataset.imgName = i + "." + extension;

  div.innerHTML = `
    <span class="num">${i}</span>
    <img src="${i}.${extension}" onclick="openViewer('${i}.${extension}'); toggleSelect(this.parentNode)">
  `;

  gallery.appendChild(div);
}

// Lightbox functions
function openViewer(src){
  document.getElementById('viewerImg').src = src;
  document.getElementById('viewer').classList.add('show');
}
function closeViewer(){
  document.getElementById('viewer').classList.remove('show');
}

// Select / deselect image
function toggleSelect(div){
  const imgName = div.dataset.imgName;
  if(div.classList.contains("selected")){
    div.classList.remove("selected");
    selected = selected.filter(x=>x!==imgName);
  } else {
    div.classList.add("selected");
    selected.push(imgName);
  }
}

// Send selection via email
document.getElementById('sendBtn').onclick = function(){
  if(selected.length === 0){
    alert("No images selected!");
    return;
  }
  const subject = encodeURIComponent("My selected images");
  const body = encodeURIComponent("I like the following images:\n" + selected.join("\n"));
  window.location.href = `mailto:${emailTo}?subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
